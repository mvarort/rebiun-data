<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REBIUN Data Explorer</title>
  <style>
    body {
      margin: 0;
      background: #f7f8fa;
      color: #1f2933;
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(900px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.1;
    }

    p {
      max-width: 720px;
      margin: 0 0 32px;
      color: #52606d;
      font-size: 1.08rem;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li + li {
      margin-top: 12px;
    }

    a {
      display: block;
      padding: 18px 20px;
      background: #ffffff;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      color: #244f6b;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover,
    a:focus-visible {
      border-color: #2f6b8f;
      text-decoration: underline;
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>REBIUN Data Explorer</h1>
    <p>Explorador estático de indicadores y visualizaciones sobre las bibliotecas universitarias españolas.</p>

    <h2>Visualizaciones disponibles</h2>
    <ul>
      <li><a href="scatter-ptgas-usuarios/">Peso de la biblioteca en el PTGAS y personas usuarias por plantilla bibliotecaria</a></li>
    </ul>
  </main>
</body>
</html>
